<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地址 / 虚拟身份生成器</title>
    <meta name="description" content="静态地址与虚拟身份资料生成工具。" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./assets/address-tool.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <div class="page-kicker">Address Generator</div>
        <h1>地址生成器</h1>
        <p>适合测试、演示和占位场景的静态资料生成页面。</p>
      </header>

      <main class="workspace">
        <section class="panel controls-panel">
          <div class="panel-head">
            <h2>生成控制台</h2>
            <p>纯前端本地生成，适合快速取样。</p>
          </div>

          <form id="generator-form" class="generator-form">
            <label>
              <span>地区</span>
              <select id="country-select" name="country">
                <option value="US">United States</option>
                <option value="KR">South Korea</option>
                <option value="CN">China</option>
                <option value="JP">Japan</option>
                <option value="HK">Hong Kong</option>
                <option value="TW">Taiwan</option>
                <option value="GB">United Kingdom</option>
                <option value="DE">Deutschland</option>
                <option value="NL">Nederland</option>
                <option value="FR">France</option>
                <option value="ES">Spain</option>
                <option value="IT">Italy</option>
                <option value="BE">Belgium</option>
                <option value="PT">Portugal</option>
                <option value="AT">Austria</option>
                <option value="CH">Switzerland</option>
                <option value="IE">Ireland</option>
                <option value="SE">Sweden</option>
                <option value="NO">Norway</option>
                <option value="CA">Canada</option>
                <option value="AU">Australia</option>
                <option value="SG">Singapore</option>
              </select>
            </label>

            <label>
              <span>身份风格</span>
              <select id="profile-mode" name="profileMode">
                <option value="balanced">均衡随机</option>
                <option value="asia">偏亚洲</option>
                <option value="western">偏欧美</option>
              </select>
            </label>

            <label>
              <span>JP / TW 输出语言</span>
              <select id="localization-mode" name="localizationMode">
                <option value="native">本地名字 / 本地地址</option>
                <option value="english">English name / English address</option>
              </select>
              <small id="localization-note" class="field-note">仅对日本和台湾生效，生成后也可以直接切换显示与复制。</small>
            </label>

            <div class="grid two-up">
              <label>
                <span>生成数量</span>
                <input id="batch-size" name="batchSize" type="number" min="1" max="12" value="1" />
              </label>

              <label>
                <span>输出格式</span>
                <select id="output-format" name="outputFormat">
                  <option value="card">卡片视图</option>
                  <option value="json">JSON</option>
                </select>
              </label>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary">生成</button>
              <button type="button" id="copy-result" class="btn btn-secondary" disabled>复制结果</button>
              <button type="button" id="download-json" class="btn btn-secondary" disabled>下载 JSON</button>
            </div>
          </form>
        </section>

        <section class="panel results-panel">
          <div class="panel-head">
            <h2>生成结果</h2>
            <p id="result-meta" role="status" aria-live="polite">等待生成。</p>
          </div>

          <div class="result-stage">
            <div id="empty-state" class="empty-state">
              <div class="empty-icon">◎</div>
              <p>点击生成开始。</p>
            </div>

            <div id="result-cards" class="result-cards" hidden></div>
            <pre id="result-json" class="result-json" hidden></pre>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/address-tool.js"></script>
  </body>
</html>
